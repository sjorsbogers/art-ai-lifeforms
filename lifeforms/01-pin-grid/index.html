<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Lifeform — Pin Grid</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- 3D Canvas -->
    <div id="canvas-container">
      <div id="hud">
        <div id="hud-state">
          <span class="hud-label">STATE</span>
          <span id="state-value">AWAKENING</span>
        </div>
        <div id="hud-gesture">
          <span class="hud-label">GESTURE</span>
          <span id="gesture-value">—</span>
        </div>
        <div id="hud-uptime">
          <span class="hud-label">UPTIME</span>
          <span id="uptime-value">00:00</span>
        </div>
      </div>
    </div>

    <!-- Identity Panel -->
    <div id="panel">

      <!-- Identity + Soul — collapsible accordions at top -->
      <div id="panel-top">

        <div class="accordion-block" id="accordion-identity">
          <button class="accordion-header" data-target="accordion-identity" aria-expanded="false">
            <span class="accordion-arrow">▶</span>
            <span class="accordion-title">IDENTITY.md</span>
          </button>
          <div class="accordion-body" hidden>
            <pre id="identity-content" class="panel-pre"></pre>
          </div>
        </div>

        <div class="accordion-block" id="accordion-soul">
          <button class="accordion-header" data-target="accordion-soul" aria-expanded="true">
            <span class="accordion-arrow">▶</span>
            <span class="accordion-title">SOUL.md</span>
          </button>
          <div class="accordion-body">
            <pre id="soul-content" class="panel-pre"></pre>
          </div>
        </div>

      </div>

      <!-- Log — scrollable, grows to fill remaining space -->
      <div class="panel-block panel-log-block">
        <div class="panel-block-title">LOG</div>
        <div id="log-content"></div>
      </div>

      <!-- Chat input — fixed at bottom -->
      <div id="chat-block">
        <input
          type="text"
          id="chat-input"
          placeholder="speak to FORM..."
          disabled
          autocomplete="off"
          spellcheck="false"
        />
        <button id="chat-send" disabled>→</button>
      </div>

    </div>
  </div>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- App modules (order matters) -->
  <script src="js/config.js"></script>
  <script src="js/gestures.js"></script>
  <script src="js/display.js"></script>
  <script src="js/identity.js"></script>
  <script src="js/brain.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
